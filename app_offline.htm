<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Đang Nâng Cấp</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f3eb;
        overflow: hidden;
      }

      .maintenance {
        width: 100%;
        height: 100%;
      }

      .maintenance img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="maintenance">
      <img src="maintenance.png" alt="Hệ thống đang nâng cấp" />
    </div>
  </body>
</html>
